# AI Documentation Reviewer Configuration

# Trigger settings
trigger:
  # How the review is triggered
  # Options: "label", "assignment", "comment", "auto"
  method: "label"
  
  # Label name that triggers review (if method is "label")
  label: "ai-review-style"
  
  # Comment command that triggers review (if method is "comment")
  command: "/ai-review-style"

# Review settings
review:
  # File patterns to review (glob patterns)
  include_patterns:
    - "**/*.rst"
    - "**/*.md"
    - "**/*.txt"
  
  # File patterns to exclude
  exclude_patterns:
    - "**/node_modules/**"
    - "**/.git/**"
    - "**/build/**"
    - "**/dist/**"
  
  # Maximum files to review in a single PR
  max_files: 20
  
  # Maximum diff size (in characters) to send to AI
  max_diff_size: 100000

# Feedback settings
feedback:
  # How granular should feedback be?
  # "minimal" = only HIGH severity issues (definite problems that need fixing)
  # "balanced" = HIGH + MEDIUM issues
  # "detailed" = all issues including LOW
  granularity: "minimal"
  
  # Should the bot request changes or just comment?
  # Options: "comment", "request_changes", "approve"
  review_action: "comment"
  
  # Include a summary comment at the end?
  include_summary: true
  
  # Maximum number of inline comments (keep low to avoid cognitive overload)
  max_inline_comments: 5
  
  # Only flag SEO issues if the PR actually touches titles/meta content
  seo_only_if_touched: true

# AI settings
ai:
  # Model to use (claude-sonnet-4-20250514 recommended for this task)
  model: "claude-sonnet-4-20250514"
  
  # Fallback model if primary is unavailable
  fallback_model: "claude-3-5-sonnet-20241022"
  
  # Maximum tokens for response
  max_tokens: 4096
