<svg width="100%" viewBox="0 0 740 90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow-cert-s" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#00684A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Self-Signed ClusterIssuer -->
  <rect x="5" y="15" width="170" height="55" rx="8" fill="#E3F5ED" stroke="#00684A" stroke-width="1.5"/>
  <text x="90" y="36" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" font-weight="700" fill="#001E2B">Self-Signed</text>
  <text x="90" y="52" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" font-weight="700" fill="#001E2B">ClusterIssuer</text>

  <!-- Arrow: signs -->
  <line x1="175" y1="42" x2="230" y2="42" stroke="#00684A" stroke-width="1.5" marker-end="url(#arrow-cert-s)"/>
  <text x="203" y="32" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#3D4F58">signs</text>

  <!-- CA Certificate -->
  <rect x="232" y="15" width="150" height="55" rx="8" fill="#ffffff" stroke="#00684A" stroke-width="1.5"/>
  <text x="307" y="36" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" font-weight="700" fill="#001E2B">CA Certificate</text>
  <text x="307" y="52" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="9" fill="#3D4F58">(isCA: true)</text>

  <!-- Arrow: stored in -->
  <line x1="382" y1="42" x2="443" y2="42" stroke="#00684A" stroke-width="1.5" marker-end="url(#arrow-cert-s)"/>
  <text x="413" y="32" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#3D4F58">stored in</text>

  <!-- CA ClusterIssuer -->
  <rect x="445" y="15" width="130" height="55" rx="8" fill="#E3F5ED" stroke="#00684A" stroke-width="1.5"/>
  <text x="510" y="36" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" font-weight="700" fill="#001E2B">CA</text>
  <text x="510" y="52" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" font-weight="700" fill="#001E2B">ClusterIssuer</text>

  <!-- Arrow: signs -->
  <line x1="575" y1="42" x2="630" y2="42" stroke="#00684A" stroke-width="1.5" marker-end="url(#arrow-cert-s)"/>
  <text x="603" y="32" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#3D4F58">signs</text>

  <!-- All other certs -->
  <rect x="632" y="10" width="100" height="65" rx="8" fill="#001E2B" stroke="#00ED64" stroke-width="1.5"/>
  <text x="682" y="30" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="10" font-weight="600" fill="#00ED64">All other certs</text>
  <text x="682" y="48" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="9" fill="#71F6BA">mongot, LB,</text>
  <text x="682" y="62" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="9" fill="#71F6BA">mongod</text>
</svg>

