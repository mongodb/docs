name: MongoDB Shell Code Examples - Test Against Local/Docker

on:
  schedule:
    # Run monthly on the 1st at 9am UTC
    - cron: '0 9 1 * *'
  pull_request:
    paths:
      - code-example-tests/command-line/mongosh/**

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      TZ: UTC

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changed tests
        id: detect
        run: bash .github/scripts/detect-changed-tests.sh mongosh
      - name: Verify comparison-kernel binaries are up to date
        if: steps.detect.outputs.run_all == 'true' || steps.detect.outputs.test_filter != ''
        uses: ./.github/actions/verify-comparison-kernel
      - name: Install Atlas CLI
        if: steps.detect.outputs.run_all == 'true' || steps.detect.outputs.test_filter != ''
        run: |
          curl https://fastdl.mongodb.org/mongocli/mongodb-atlas-cli_1.50.0_linux_x86_64.deb --output atlas-cli.deb
          sudo apt install ./atlas-cli.deb
      - name: Set up a local deployment using Atlas CLI
        if: steps.detect.outputs.run_all == 'true' || steps.detect.outputs.test_filter != ''
        run: |
          atlas deployments setup myLocalRs1 --type local --port 27017 --force
      - name: Install MongoDB Database Tools to load sample data
        if: steps.detect.outputs.run_all == 'true' || steps.detect.outputs.test_filter != ''
        run: |
          curl https://fastdl.mongodb.org/tools/db/mongodb-database-tools-ubuntu2204-x86_64-100.13.0.deb --output mdb-db-tools.deb
          sudo apt install ./mdb-db-tools.deb
      - name: Download sample data
        if: steps.detect.outputs.run_all == 'true' || steps.detect.outputs.test_filter != ''
        run: curl  https://atlas-education.s3.amazonaws.com/sampledata.archive -o sampledata.archive
      - name: Add sample data to database
        if: steps.detect.outputs.run_all == 'true' || steps.detect.outputs.test_filter != ''
        run: mongorestore --archive=sampledata.archive --port=27017
      - name: Setup Node
        if: steps.detect.outputs.run_all == 'true' || steps.detect.outputs.test_filter != ''
        uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Install mongosh
        if: steps.detect.outputs.run_all == 'true' || steps.detect.outputs.test_filter != ''
        run: |
          curl -L https://downloads.mongodb.com/compass/mongosh-2.5.8-linux-x64.tgz -o mongosh.tgz
          tar -xzf mongosh.tgz
          sudo mv mongosh-2.5.8-linux-x64/bin/mongosh /usr/local/bin/
          mongosh --version
      - name: Install dependencies
        if: steps.detect.outputs.run_all == 'true' || steps.detect.outputs.test_filter != ''
        run: |
          cd code-example-tests/command-line/mongosh/
          npm install
      - name: Create environment file with connection string
        if: steps.detect.outputs.run_all == 'true' || steps.detect.outputs.test_filter != ''
        run: |
          cd code-example-tests/command-line/mongosh/
          touch .env
          # For 'mongosh', DO NOT set the 'directConnection' parameter to 'true'
          {
            echo "CONNECTION_STRING=\"mongodb://localhost:27017\""
            echo "CONNECTION_PORT=27017"
            echo "TZ=UTC"
          } >> .env
      - name: Run tests
        if: steps.detect.outputs.run_all == 'true' || steps.detect.outputs.test_filter != ''
        run: |
          cd code-example-tests/command-line/mongosh/
          if [[ "${{ steps.detect.outputs.run_all }}" != "false" ]] || [[ -z "${{ steps.detect.outputs.test_filter }}" ]]; then
            npm test
          else
            set -a
            source .env
            set +a
            npx jest --runInBand --detectOpenHandles --testPathPattern='${{ steps.detect.outputs.test_filter }}'
          fi

      - name: Notify Slack on scheduled run failure
        if: failure() && github.event_name == 'schedule'
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{
              "channel": "#docs-devdocs-notifications",
              "username": "Code Examples Bot",
              "icon_emoji": ":warning:",
              "text": "⚠️ *MongoDB Shell* monthly code examples test failed!\n*Workflow:* ${{ github.workflow }}\n*Run:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }' \
            "$SLACK_WEBHOOK"
