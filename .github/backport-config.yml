# Backport configuration.
#
# Used by .github/scripts/backport.py to decide which version directories
# under content/<project>/ are eligible backport targets.
#
# Add a project entry only when its EOL or non-target versions need to be
# excluded. Projects not listed here have every sibling version directory
# treated as an eligible target.

exclude_versions:
  manual:
    - v4.4
    - v5.0
    - v6.0

# Per-project label gate. Writers opt in to a backport by adding one or more
# labels in the format backport-<project>-<version> before merging. Keys are
# project directory names under content/; values are the label prefix used to
# match those opt-in labels. Only versions explicitly named in a matching label
# are backport targets — the script never backports to all versions by default.
#
# Example: to backport a manual PR to v8.0 and v8.2, add both
#   backport-manual-v8.0
#   backport-manual-v8.2
# labels to the PR before merging.
label_map:
  atlas-cli: backport-atlas-cli
  atlas-operator: backport-atlas-operator
  c-driver: backport-c-driver
  cpp-driver: backport-cpp-driver
  csharp: backport-csharp
  django-mongodb: backport-django-mongodb
  entity-framework: backport-entity-framework
  golang: backport-golang
  java: backport-java
  java-rs: backport-java-rs
  kafka-connector: backport-kafka-connector
  kotlin: backport-kotlin
  kotlin-sync: backport-kotlin-sync
  kubernetes: backport-kubernetes
  laravel-mongodb: backport-laravel-mongodb
  manual: backport-manual
  mongodb-analyzer: backport-mongodb-analyzer
  mongoid: backport-mongoid
  mongosync: backport-mongosync
  node: backport-node
  ops-manager: backport-ops-manager
  php-library: backport-php-library
  pymongo-arrow-driver: backport-pymongo-arrow-driver
  pymongo-driver: backport-pymongo-driver
  ruby-driver: backport-ruby-driver
  rust: backport-rust
  scala-driver: backport-scala-driver
  self-managed-search: backport-self-managed-search
  spark-connector: backport-spark-connector
