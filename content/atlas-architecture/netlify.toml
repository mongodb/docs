 ### Redirect for partner showcase rename (formerly partners library)
 [[redirects]]
 from = "/docs/atlas/architecture/:version/partners-library/*"
 to = "/docs/atlas/architecture/:version/partner-showcase/:splat"

    ### Redirect for retail-dynamic-pricing page rename (DOCSP-58339)
    [[redirects]]
    from = "/docs/atlas/architecture/:version/solutions-library/retail-dynamic-pricing/"
    to = "/docs/atlas/architecture/:version/solutions-library/ai-driven-real-time-pricing/"

    ### Redirect for retail-catalog page deletion (DOCSP-58339)
    [[redirects]]
    from = "/docs/atlas/architecture/:version/solutions-library/retail-catalog/"
    to = "/docs/atlas/architecture/:version/solutions-library/retail/"

### WILDCARD REDIRECTS (none)


