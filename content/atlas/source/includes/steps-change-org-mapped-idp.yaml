---
stepnum: 1
level: 4
ref: unmap-idp
title: "Unmap the current Identity Provider."
content: |

  a. .. include:: /includes/nav/list-federation.rst

  #. In the sidebar, click :guilabel:`Organizations`.

  #. Click the :guilabel:`Organization` whose |idp| you wish to change.

  #. Click :guilabel:`Manage` for the |idp| which is currently mapped
     to the organization.

  #. Click :guilabel:`Disconnect Identity Provider` and confirm.
---
stepnum: 2
level: 4
ref: map-idp
title: "Map the new Identity Provider."
content: |

  a. On the same Organization page, click :guilabel:`Connect Identity
     Provider(s)`.

  #. Select the organization.

  #. Click :guilabel:`Connect`.
...
