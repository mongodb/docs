[build]
publish = "dist"
base = "content/entity-framework"

[build.environment]
REPO_NAME = "docs-entity-framework"
SECRETS_SCAN_ENABLED = "false"
MUT_COMMANDS_ENABLED = "false"

[context.production.environment]
ENV = "dotcomprd"

[context.preprd.environment]
ENV = "dotcomstg"

[context.deploy-preview.environment]
ENV = "prd"

[context.branch-deploy.environment]
ENV = "prd"

[context.preview-server.environment]
ENV = "prd"

[context.dev.environment]
ENV = "stg"

### OFFLINE REDIRECTS
### ALIAS REDIRECTS
### WILDCARD REDIRECTS
### PAGE-SPECIFIC REDIRECTS
### CATCH ALLS
##redirects any pages not at any of the active versions to current (makes eols technically unnecessary)

### OFFLINE REDIRECTS 
[[redirects]]
from = "/docs/entity-framework/v7.0/*"
to = "/docs/entity-framework/current/:splat"

### ALIAS REDIRECTS
[[redirects]]
from = "/docs/entity-framework/v10.0/*"
to = "/docs/entity-framework/current/:splat"
status = 302

[[redirects]]
from = "/docs/entity-framework/master/*"
to = "/docs/entity-framework/upcoming/:splat"

### WILDCARD REDIRECTS
[[redirects]]
from = "/docs/entity-framework/upcoming/whats-new/"
to = "/docs/entity-framework/upcoming/reference/release-notes/"

[[redirects]]
from = "/docs/entity-framework/:version/whats-new/"
to = "/docs/entity-framework/:version/release-notes/"

#Online versions: ['upcoming', 'current', 'v8.4', 'v8.3', 'v8.2', 'v8.1', 'v8.0']

