<svg width="730px" height="580px" viewBox="0 0 730 580" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Kubernetes Cluster outer container -->
  <rect x="30" y="20" width="670" height="545" rx="16" fill="none" stroke="#00684A" stroke-width="1.5" stroke-dasharray="6 4"/>
  <rect x="50" y="10" width="190" height="24" rx="6" fill="#00684A"/>
  <text x="145" y="26" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Kubernetes Cluster</text>

  <!-- Operator-Managed Replica Set container (wider to contain right-side label) -->
  <rect x="55" y="44" width="635" height="170" rx="12" fill="#E3F5ED" stroke="#00684A" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="373" y="68" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="600" fill="#00684A">Operator-Managed MongoDB Replica Set</text>

  <!-- rs nodes: centers at 180, 335, 490 -->
  <!-- rs-0 -->
  <rect x="125" y="84" width="110" height="56" rx="8" fill="#ffffff" stroke="#00684A" stroke-width="1.5"/>
  <text x="180" y="107" text-anchor="middle" dominant-baseline="central" font-family="monospace" font-size="13" font-weight="700" fill="#001E2B">rs-0</text>
  <text x="180" y="126" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#3D4F58">Primary</text>

  <!-- rs-1 -->
  <rect x="280" y="84" width="110" height="56" rx="8" fill="#ffffff" stroke="#00684A" stroke-width="1.5"/>
  <text x="335" y="107" text-anchor="middle" dominant-baseline="central" font-family="monospace" font-size="13" font-weight="700" fill="#001E2B">rs-1</text>
  <text x="335" y="126" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#3D4F58">Secondary</text>

  <!-- rs-2 -->
  <rect x="435" y="84" width="110" height="56" rx="8" fill="#ffffff" stroke="#00684A" stroke-width="1.5"/>
  <text x="490" y="107" text-anchor="middle" dominant-baseline="central" font-family="monospace" font-size="13" font-weight="700" fill="#001E2B">rs-2</text>
  <text x="490" y="126" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#3D4F58">Secondary</text>

  <!-- mongod managed label — inside box, to the right of rs-2 -->
  <text x="558" y="107" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#3D4F58">(mongod managed</text>
  <text x="558" y="122" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#3D4F58"> by operator)</text>

  <!-- TLS funnel: rs-0, rs-1, rs-2 converge to x=335, then arrow down to Envoy -->
  <line x1="180" y1="140" x2="335" y2="158" stroke="#00684A" stroke-width="1" fill="none"/>
  <line x1="335" y1="140" x2="335" y2="158" stroke="#00684A" stroke-width="1" fill="none"/>
  <line x1="490" y1="140" x2="335" y2="158" stroke="#00684A" stroke-width="1" fill="none"/>
  <text x="350" y="174" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#3D4F58">TLS</text>
  <line x1="335" y1="158" x2="335" y2="289" stroke="#00684A" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Envoy Proxy box (centered at 365) -->
  <rect x="175" y="290" width="380" height="115" rx="10" fill="#001E2B" stroke="#00ED64" stroke-width="1.5"/>
  <text x="365" y="314" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#00ED64">Envoy Proxy</text>
  <text x="365" y="331" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#9BCFC3">(operator-managed)</text>
  <circle cx="199" cy="352" r="3" fill="#00ED64"/>
  <text x="211" y="356" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#C0DED9">Listens on port 27029</text>
  <circle cx="199" cy="372" r="3" fill="#00ED64"/>
  <text x="211" y="376" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#C0DED9">Single LB Service</text>
  <circle cx="199" cy="392" r="3" fill="#00ED64"/>
  <text x="211" y="396" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#C0DED9">mTLS to mongot backends</text>

  <!-- Direct arrows from Envoy bottom to each mongot (no horizontal connector) -->
  <line x1="275" y1="405" x2="275" y2="472" stroke="#00684A" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="455" y1="405" x2="455" y2="472" stroke="#00684A" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- mongot-0 StatefulSet (center=275) -->
  <rect x="192" y="473" width="165" height="64" rx="8" fill="#ffffff" stroke="#00684A" stroke-width="1.5"/>
  <text x="275" y="496" text-anchor="middle" dominant-baseline="central" font-family="monospace" font-size="13" font-weight="700" fill="#001E2B">mongot-0</text>
  <text x="275" y="516" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#3D4F58">StatefulSet</text>

  <!-- mongot-1 StatefulSet (center=455) -->
  <rect x="372" y="473" width="165" height="64" rx="8" fill="#ffffff" stroke="#00684A" stroke-width="1.5"/>
  <text x="455" y="496" text-anchor="middle" dominant-baseline="central" font-family="monospace" font-size="13" font-weight="700" fill="#001E2B">mongot-1</text>
  <text x="455" y="516" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#3D4F58">StatefulSet</text>

  <!-- Search pods label -->
  <text x="550" y="496" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#3D4F58">(Search pods</text>
  <text x="550" y="511" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#3D4F58"> per member)</text>

  <!-- MongoDB leaf logo mark -->
  <g transform="translate(660, 32)">
    <path d="M10 0 C10 0, 18 8, 18 16 C18 24, 10 28, 10 28 C10 28, 2 24, 2 16 C2 8, 10 0, 10 0Z" fill="#00ED64"/>
    <line x1="10" y1="14" x2="10" y2="30" stroke="#00684A" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
