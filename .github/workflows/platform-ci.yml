name: CI (platform)

on:
  pull_request:
  push:
    branches:
      - 'backport/**'
  workflow_dispatch:

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      platform: ${{ steps.filter.outputs.platform }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for platform changes
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "platform=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "platform=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          MERGE_BASE=$(git merge-base \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}") || exit 1
          CHANGED_FILES=$(git diff --name-only \
            "$MERGE_BASE" \
            "${{ github.event.pull_request.head.sha }}") || exit 1
          if echo "$CHANGED_FILES" | grep -qE '^platform/|^\.github/workflows/platform-ci\.yml$'; then
            echo "platform=true" >> "$GITHUB_OUTPUT"
          else
            echo "platform=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    name: Run Tests in platform
    needs: changes
    if: needs.changes.outputs.platform == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform
    env:
      NPM_BASE_64_AUTH: ${{ secrets.NPM_BASE_64_AUTH }}
      NPM_EMAIL: ${{ secrets.NPM_EMAIL }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install pnpm
        run: npm install -g pnpm@10.27.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: platform/pnpm-lock.yaml

      - name: Cache mongodb-memory-server binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-binaries-${{ runner.os }}

      - name: Install, lint, and test
        run: |
          # Remove --no-frozen-lockfile as soon as possible
          pnpm install --no-frozen-lockfile
          pnpm run lint
          pnpm run test
          pnpm run typecheck

  platform-ci-status:
    name: Platform CI
    needs: [changes, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Report status
        run: |
          if [[ "${{ needs.changes.result }}" == "failure" || \
                "${{ needs.changes.result }}" == "cancelled" || \
                "${{ needs.test.result }}" == "failure" || \
                "${{ needs.test.result }}" == "cancelled" ]]; then
            echo "Platform CI failed (changes: ${{ needs.changes.result }}, test: ${{ needs.test.result }})."
            exit 1
          fi
          echo "Platform CI passed (test result: ${{ needs.test.result }})"
