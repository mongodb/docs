name = "golang"
title = "Go Driver"
toc_landing_pages = [
    "/fundamentals/connections",
    "/fundamentals/crud",
    "/usage-examples",
]

intersphinx = [
    "https://www.mongodb.com/docs/manual/objects.inv",
    "https://www.mongodb.com/docs/drivers/objects.inv",
    "https://www.mongodb.com/docs/atlas/objects.inv",
    "https://www.mongodb.com/docs/objects.inv",
]
sharedinclude_root = "https://raw.githubusercontent.com/10gen/docs-shared/main/"

[constants]
driver-long = "MongoDB Go Driver"
driver-short = "Go driver"
docs-branch = "master"
version = "v1.17.9"
example = "https://raw.githubusercontent.com/mongodb/docs-golang/{+docs-branch+}/source/includes/usage-examples/code-snippets"
api = "https://pkg.go.dev/go.mongodb.org/mongo-driver@{+version+}"
min-lang-version = "1.18"
stable-api = "Stable API"
qe = "Queryable Encryption"
key-vault-long = "key vault collection"
kms-long = "Key Management System"
cmk-long = "Customer Master Key"
dek-long = "Data Encryption Key"
csfle-short = "CSFLE"
csfle-long = "Client-side Field Level Encryption"
mdb-server = "MongoDB Server"
search = "MongoDB Search"
vector-search = "MongoDB Vector Search"
language = "Go"

[[banners]]
targets = ["index.txt"]
variant = "tip"
value = """
    {+driver-long+} v1.x is deprecated. To learn how to migrate your application
    to v2.0, visit the :github:`Go Driver 2.0 Migration Guide.
    </mongodb/mongo-go-driver/blob/master/docs/migration-2.0.md>`
    """
