name: Documentation Linting

on:
  pull_request:
    paths:
      - 'content/**/*.txt'
      - 'content/**/*.rst'
      - 'content/**/*.md'
      - 'content/**/*.mdx'

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for diff
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: |
          cd .github/lint-docs && pnpm install
      
      - name: Get changed doc files
        id: changed-files
        run: |
          # Get list of changed doc files in this PR (space-separated for CLI)
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '\.(rst|txt|md|mdx)$' | grep -v "^content/table-of-contents/" | tr '\n' ' ' || true)
          
          if [ -n "$FILES" ]; then
            echo "has_files=true" >> $GITHUB_OUTPUT
            echo "📄 Found changed doc files:"
            echo "$FILES"
            # Save to file for reliable passing between steps
            echo "$FILES" > /tmp/changed-files.txt
          else
            echo "has_files=false" >> $GITHUB_OUTPUT
            echo "No doc files changed"
          fi
      
      - name: Run SEO Linter
        if: steps.changed-files.outputs.has_files == 'true'
        continue-on-error: true  # Warn only, don't fail the PR
        run: |
          echo "🔍 Running SEO linter..."
          FILES=$(cat /tmp/changed-files.txt)
          npx tsx .github/lint-docs/seo-lint-cli.ts $FILES
      
      - name: Run 404 Linter
        if: steps.changed-files.outputs.has_files == 'true'
        continue-on-error: true  # Warn only, don't fail the PR
        run: |
          echo "🔗 Running 404 linter..."

          # Install lychee
          echo "Installing lychee..."
          curl -sLO https://github.com/lycheeverse/lychee/releases/download/v0.18.0/lychee-x86_64-unknown-linux-gnu.tar.gz
          tar -xzf lychee-x86_64-unknown-linux-gnu.tar.gz
          chmod +x lychee
          sudo mv lychee /usr/local/bin/

          FILES=$(cat /tmp/changed-files.txt)
          npx tsx .github/lint-docs/404-lint-cli.ts $FILES

      - name: Fetch synonyms file
        run: |
          curl -fsSL "https://raw.githubusercontent.com/mongodb/docs-search-transport/main/resources/synonyms.csv" \
            -o /tmp/synonyms.csv || echo "⚠️ Could not fetch synonyms file — keyword-in-synonyms check will be skipped"

      - name: Run Findability Linter
        if: steps.changed-files.outputs.has_files == 'true'
        continue-on-error: true  # Warn only (facet errors are advisory in CI for now)
        run: |
          echo "📎 Running findability linter..."
          FILES=$(cat /tmp/changed-files.txt)
          SYNONYMS_FLAG=""
          if [ -f /tmp/synonyms.csv ]; then
            SYNONYMS_FLAG="--synonyms /tmp/synonyms.csv"
          fi
          npx tsx .github/lint-docs/findability-lint-cli.ts $SYNONYMS_FLAG $FILES

      - name: Run Vale Linter
        if: steps.changed-files.outputs.has_files == 'true'
        continue-on-error: true  # Warn only, don't fail the PR
        run: |
          echo "📝 Running Vale prose linter..."

          # Install Vale and its RST dependency
          curl -sLO https://github.com/errata-ai/vale/releases/download/v3.4.1/vale_3.4.1_Linux_64-bit.tar.gz
          tar -xzf vale_3.4.1_Linux_64-bit.tar.gz
          chmod +x vale
          sudo mv vale /usr/local/bin/
          pip install docutils --quiet

          # Vale only runs on RST/TXT files
          VALE_FILES=$(cat /tmp/changed-files.txt | tr ' ' '\n' | grep -E '\.(txt|rst)$' | tr '\n' ' ' || true)
          if [ -n "$VALE_FILES" ]; then
            vale --config vale.ini --output=line $VALE_FILES
          else
            echo "No RST/TXT files changed, skipping Vale."
          fi

      - name: Summary
        if: always()
        run: |
          echo "## 📋 Documentation Lint Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Linters ran on changed documentation files." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **SEO Linter**: Checks titles, meta descriptions, headings, images" >> $GITHUB_STEP_SUMMARY
          echo "- **404 Linter**: Checks for broken external links" >> $GITHUB_STEP_SUMMARY
          echo "- **Findability Linter**: Facet names/values, keyword-in-synonyms hints, MongoDB URL trailing slashes" >> $GITHUB_STEP_SUMMARY
          echo "- **Vale**: Checks prose against the MongoDB style guide" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ These are warnings only and do not block the PR." >> $GITHUB_STEP_SUMMARY

  ref-anchor-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Python dependencies
        run: pip install toml

      - name: Run Ref Anchor Checker
        run: |
          python3 content/tools/ref-anchor-impact-detector/detect_ref_impacts.py --ci --base origin/${{ github.base_ref }} | tee /tmp/ref-checker-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          if [ $EXIT_CODE -ne 0 ]; then
            SUMMARY=$(grep -E '^[0-9]+ removed anchor' /tmp/ref-checker-output.txt | tail -1)
            echo "::error::${SUMMARY:-Ref anchor check failed. See log for details.}"
          fi
          exit $EXIT_CODE

      - name: Summary
        if: always()
        run: |
          if [ -f /tmp/ref-checker-output.txt ]; then
            echo "## 🔍 Ref Anchor Check" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat /tmp/ref-checker-output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
