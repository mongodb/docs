# Backport configuration.
#
# Used by .github/scripts/backport.py to decide which version directories
# under content/<project>/ are eligible backport targets.
#
# Add a project entry only when its EOL or non-target versions need to be
# excluded. Projects not listed here have every sibling version directory
# treated as an eligible target.

exclude_versions:
  manual:
    - v4.4
    - v5.0
    - v6.0

# Per-project label gate. The workflow only backports changes for projects
# whose label appears on the merged PR. Keys are project directory names
# under content/; values are the exact label strings produced by the
# Pull Request Labeler.
label_map:
  atlas-cli: Atlas Cli
  atlas-operator: Atlas Operator
  c-driver: C Driver
  cpp-driver: CPP Driver
  csharp: CSharp
  django-mongodb: Django
  entity-framework: Entity Framework
  golang: Golang
  java: Java
  java-rs: Java RS
  kafka-connector: Kafka Connector
  kotlin: Kotlin
  kotlin-sync: Kotlin Sync
  kubernetes: Kubernetes
  laravel-mongodb: Laravel
  manual: Manual
  mongodb-analyzer: Analyzer
  mongoid: Mongo ID
  mongosync: Mongo Sync
  node: Node
  ops-manager: Ops Manager
  php-library: PHP Library
  pymongo-arrow-driver: Pymongo Arrow Driver
  pymongo-driver: Pymongo Driver
  ruby-driver: Ruby Driver
  rust: Rust
  scala-driver: Scala Driver
  spark-connector: Spark Connector
