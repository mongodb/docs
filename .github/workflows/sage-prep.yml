name: Sage prep

on:
  repository_dispatch:
    types: [sage-prep]

jobs:
  sage-prep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests anthropic

      - name: Prep ticket for sage
        run: python .github/scripts/sage_prep.py
        env:
          ISSUE_KEY: ${{ github.event.client_payload.issue_key }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          GROVE_SAGE_PREP_API_KEY: ${{ secrets.GROVE_SAGE_PREP_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
