<svg width="520" height="520" viewBox="0 0 520 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- External MongoDB Replica Set (top, outside K8s) -->
  <rect x="30" y="20" width="460" height="120" rx="12" fill="#E3F5ED" stroke="#00684A" stroke-width="1.5" stroke-dasharray="6 4"/>
  <rect x="50" y="10" width="240" height="24" rx="6" fill="#00684A"/>
  <text x="170" y="26" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="600" fill="#ffffff">External MongoDB Replica Set</text>

  <!-- mongod box -->
  <rect x="100" y="55" width="320" height="56" rx="8" fill="#ffffff" stroke="#00684A" stroke-width="1.5"/>
  <text x="260" y="78" text-anchor="middle" dominant-baseline="central" font-family="monospace" font-size="13" font-weight="700" fill="#001E2B">mongod (replica set)</text>
  <text x="260" y="97" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="10" fill="#3D4F58">(Your external mongod instances)</text>

  <!-- TLS label -->
  <text x="260" y="175" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#3D4F58">TLS connection, port 27028</text>

  <!-- Arrow from mongod down to Envoy -->
  <line x1="260" y1="111" x2="260" y2="240" stroke="#00684A" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Kubernetes Cluster (bottom container) -->
  <rect x="30" y="200" width="460" height="305" rx="16" fill="none" stroke="#00684A" stroke-width="1.5" stroke-dasharray="6 4"/>
  <rect x="50" y="190" width="185" height="24" rx="6" fill="#00684A"/>
  <text x="142" y="206" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="600" fill="#ffffff">Kubernetes Cluster</text>

  <!-- Envoy Proxy box -->
  <rect x="80" y="245" width="360" height="100" rx="10" fill="#001E2B" stroke="#00ED64" stroke-width="1.5"/>
  <text x="260" y="270" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="700" fill="#00ED64">Envoy L7 Proxy</text>
  <text x="260" y="288" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="10" fill="#9BCFC3">(operator-managed)</text>
  <circle cx="104" cy="310" r="3" fill="#00ED64"/>
  <text x="116" y="314" font-family="sans-serif" font-size="11" fill="#C0DED9">Listens on port 27028</text>
  <circle cx="104" cy="328" r="3" fill="#00ED64"/>
  <text x="116" y="332" font-family="sans-serif" font-size="11" fill="#C0DED9">mTLS to mongot backend</text>

  <!-- Arrow from Envoy to mongot -->
  <line x1="260" y1="345" x2="260" y2="405" stroke="#00684A" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- mongot pods box -->
  <rect x="120" y="410" width="280" height="64" rx="8" fill="#ffffff" stroke="#00684A" stroke-width="1.5"/>
  <text x="260" y="435" text-anchor="middle" dominant-baseline="central" font-family="monospace" font-size="13" font-weight="700" fill="#001E2B">mongot pods</text>
  <text x="260" y="455" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#3D4F58">StatefulSet, port 27028</text>

  <!-- Side labels -->
  <text x="420" y="435" font-family="sans-serif" font-size="11" fill="#3D4F58">(Search pods)</text>

  <!-- MongoDB leaf logo -->
  <g transform="translate(452, 32)">
    <path d="M10 0 C10 0, 18 8, 18 16 C18 24, 10 28, 10 28 C10 28, 2 24, 2 16 C2 8, 10 0, 10 0Z" fill="#00ED64"/>
    <line x1="10" y1="14" x2="10" y2="30" stroke="#00684A" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
