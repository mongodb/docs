# Agent Skill ownership and review manifest.
#
# Every skill under .claude/skills/ must have an entry here. The PR template
# for agent skills (.github/PULL_REQUEST_TEMPLATE/agent-skill.md) requires
# authors to add or update an entry when a skill is added or changed.
#
# Fields:
#   name                  string. Skill directory name (matches
#                         .claude/skills/<name>/).
#   path                  string. Repo-relative path to the skill directory.
#   dris                  list of 1-2 strings. Directly Responsible
#                         Individuals. Each entry is a GitHub username
#                         (preferred, no leading @) or email address. The
#                         first entry is the primary DRI; the second, if
#                         present, is the backup. DRIs own maintenance,
#                         review, and response to issues for this skill.
#   last_reviewed         string (ISO date, YYYY-MM-DD). The most recent
#                         review date. Update on any substantive change and
#                         on periodic review passes.
#   review_cadence_days   integer. Maximum days between reviews before the
#                         skill is considered stale. Default 30 during
#                         the current skills-launch evaluation period.
#
# Example:
#   - name: example-skill
#     path: .claude/skills/example-skill
#     dris:
#       - octocat
#       - hubot
#     last_reviewed: 2026-04-22
#     review_cadence_days: 30

