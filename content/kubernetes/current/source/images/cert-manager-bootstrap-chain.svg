<svg width="760px" height="140px" viewBox="0 0 760 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Node 1: Self-Signed ClusterIssuer -->
  <rect x="15" y="30" width="140" height="60" rx="8" fill="#E3FCF3" stroke="#00684A" stroke-width="1.5"/>
  <text font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#023430" x="85" y="53" text-anchor="middle" dominant-baseline="central">Self-Signed</text>
  <text font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#023430" x="85" y="73" text-anchor="middle" dominant-baseline="central">ClusterIssuer</text>

  <!-- Arrow 1 -->
  <line x1="157" y1="60" x2="215" y2="60" stroke="#00684A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#023430" x="187" y="51" text-anchor="middle">signs</text>

  <!-- Node 2: CA Certificate -->
  <rect x="218" y="30" width="140" height="60" rx="8" fill="#E3FCF3" stroke="#00684A" stroke-width="1.5"/>
  <text font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#023430" x="288" y="53" text-anchor="middle" dominant-baseline="central">CA Certificate</text>
  <text font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#023430" x="288" y="73" text-anchor="middle" dominant-baseline="central">(isCA: true)</text>

  <!-- Arrow 2 -->
  <line x1="360" y1="60" x2="418" y2="60" stroke="#00684A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#023430" x="390" y="51" text-anchor="middle">stored in</text>

  <!-- Node 3: CA ClusterIssuer -->
  <rect x="421" y="30" width="140" height="60" rx="8" fill="#E3FCF3" stroke="#00684A" stroke-width="1.5"/>
  <text font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#023430" x="491" y="53" text-anchor="middle" dominant-baseline="central">CA</text>
  <text font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#023430" x="491" y="73" text-anchor="middle" dominant-baseline="central">ClusterIssuer</text>

  <!-- Arrow 3 -->
  <line x1="563" y1="60" x2="621" y2="60" stroke="#00684A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#023430" x="593" y="51" text-anchor="middle">signs</text>

  <!-- Node 4: All Other Certs -->
  <rect x="624" y="30" width="115" height="60" rx="8" fill="#023430" stroke="#00684A" stroke-width="1.5"/>
  <text font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#FFFFFF" x="681" y="53" text-anchor="middle" dominant-baseline="central">All other</text>
  <text font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#FFFFFF" x="681" y="73" text-anchor="middle" dominant-baseline="central">certs</text>
</svg>
