# When the MDX replacement for snooty.toml is decided, add a new entry here.
# The workflow reads this file at runtime — no changes to the workflow needed.
# Also add the new file glob to the `paths:` filter in eol-jira-ticket.yml.
patterns:
  - file_glob: "content/**/snooty.toml"
    eol_pattern: "^\\+eol\\s*=\\s*true"

  # Uncomment and update when the MDX config file format is decided:
  # - file_glob: "content-mdx/**/docs.yml"
  #   eol_pattern: "^\\+eol:\\s*true"
