name: Daily merge main into feature/self-managed-search

on:
  schedule:
    - cron: "0 13 * * *" # 9am ET daily
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/self-managed-search
          fetch-depth: 0
          token: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge main into feature branch
        id: merge
        run: |
          git fetch origin main
          if git merge origin/main --no-edit; then
            echo "merge_status=success" >> $GITHUB_OUTPUT
          else
            CONFLICTS=$(git diff --name-only --diff-filter=U)
            echo "merge_status=conflict" >> $GITHUB_OUTPUT
            echo "conflicts<<EOF" >> $GITHUB_OUTPUT
            echo "$CONFLICTS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            git merge --abort
          fi

      - name: Push branch
        if: steps.merge.outputs.merge_status == 'success'
        run: git push origin feature/self-managed-search

      - name: Send Slack notification on success
        if: steps.merge.outputs.merge_status == 'success'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_MONGOT_MERGE }}
        run: |
          jq -n \
            '{"text": "Daily merge of main into feature/self-managed-search completed successfully."}' | \
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d @-

      - name: Determine on-call assignee
        if: steps.merge.outputs.merge_status == 'conflict'
        id: rotation
        run: |
          WEEK=$(date +%V | sed 's/^0*//')
          MOD=$((WEEK % 4))
          case $MOD in
            3) ASSIGNEE="Lauren Tran" ;;
            0) ASSIGNEE="Jeffrey Allen" ;;
            1) ASSIGNEE="Joseph Dougherty" ;;
            2) ASSIGNEE="Kanchana Sekhar" ;;
          esac
          echo "assignee=$ASSIGNEE" >> $GITHUB_OUTPUT

      - name: Send Slack notification on conflict
        if: steps.merge.outputs.merge_status == 'conflict'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_MONGOT_MERGE }}
          ASSIGNEE: ${{ steps.rotation.outputs.assignee }}
          CONFLICTS: ${{ steps.merge.outputs.conflicts }}
        run: |
          jq -n \
            --arg text "Merge conflict on feature/self-managed-search — manual resolution needed. Assigned to: ${ASSIGNEE}. Conflicting files:\n${CONFLICTS}" \
            '{"text": $text}' | \
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d @-

      - name: Send Slack notification on workflow failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_MONGOT_MERGE }}
        run: |
          jq -n \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{"text": ("Daily merge workflow for feature/self-managed-search failed. Check the run for details: " + $run_url)}' | \
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d @-
