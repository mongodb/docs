# Per-test timeouts. Without these, a test that hangs (e.g., waiting on
# MongoDB server selection) can stall the entire suite. SEPARATE_THREAD
# is required so the timeout actually interrupts a blocked test thread.
junit.jupiter.execution.timeout.default = 15s
junit.jupiter.execution.timeout.testable.method.default = 15s
junit.jupiter.execution.timeout.lifecycle.method.default = 10s
junit.jupiter.execution.timeout.thread.mode.default = SEPARATE_THREAD
