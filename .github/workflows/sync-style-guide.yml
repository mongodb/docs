name: Sync Style Guide

on:
  # 1st of each month, 9:00 UTC
  schedule:
    - cron: '0 9 1 * *'

  workflow_dispatch:

env:
  STYLE_GUIDE_REVIEWER: 'emetozar'
  STYLE_GUIDE_PATH: 'content/meta/source/style-guide'
  PR_REVIEWER: 'jwilliams-mongo'

permissions:
  contents: write
  pull-requests: write

jobs:
  check-for-drift:
    if: github.repository == '10gen/docs-mongodb-internal'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for style guide changes since last sync
        id: check
        run: |
          set -euo pipefail

          LAST_KNOWN=""
          if [ -f ".github/ai-reviewer/.style-guide-version" ]; then
            LAST_KNOWN=$(tr -d ' \n\r' < ".github/ai-reviewer/.style-guide-version")
          fi

          LATEST_SHA=$(git log -1 --format='%H' -- "${STYLE_GUIDE_PATH}")

          if [ -z "$LATEST_SHA" ]; then
            echo "::error::No commits found for ${STYLE_GUIDE_PATH}"
            exit 1
          fi

          LATEST_DATE=$(git log -1 --format='%ci' -- "${STYLE_GUIDE_PATH}")
          LATEST_MESSAGE=$(git log -1 --format='%s' -- "${STYLE_GUIDE_PATH}")

          echo "latest_sha=${LATEST_SHA}" >> "${GITHUB_OUTPUT}"
          echo "latest_date=${LATEST_DATE}" >> "${GITHUB_OUTPUT}"
          {
            echo 'latest_message<<STYLE_GUIDE_MSG_EOF'
            echo "${LATEST_MESSAGE}"
            echo 'STYLE_GUIDE_MSG_EOF'
          } >> "${GITHUB_OUTPUT}"
          echo "last_known=${LAST_KNOWN}" >> "${GITHUB_OUTPUT}"

          if [ "$LATEST_SHA" != "$LAST_KNOWN" ]; then
            echo "has_updates=true" >> "${GITHUB_OUTPUT}"

            if [ -n "$LAST_KNOWN" ] && git cat-file -e "${LAST_KNOWN}" 2>/dev/null; then
              CHANGED_FILES=$(git diff --name-only "${LAST_KNOWN}" HEAD -- "${STYLE_GUIDE_PATH}" | head -30)
              CHANGE_COUNT=$(echo "$CHANGED_FILES" | grep -c . || true)
            else
              CHANGED_FILES="(full diff unavailable — tracker was empty or commit not found)"
              CHANGE_COUNT="unknown"
            fi

            echo "change_count=${CHANGE_COUNT}" >> "${GITHUB_OUTPUT}"
            {
              echo 'changed_files<<STYLE_GUIDE_FILES_EOF'
              echo "${CHANGED_FILES}"
              echo 'STYLE_GUIDE_FILES_EOF'
            } >> "${GITHUB_OUTPUT}"

            echo "📢 Style guide has changed since last sync"
            echo "   Latest commit: ${LATEST_SHA}"
            echo "   Message: ${LATEST_MESSAGE}"
            echo "   Date: ${LATEST_DATE}"
            echo "   Files changed: ${CHANGE_COUNT}"
          else
            echo "has_updates=false" >> "${GITHUB_OUTPUT}"
            echo "✅ style-guide-reference.md is in sync (${LATEST_SHA})"
          fi

      - name: Check for existing sync PR
        if: steps.check.outputs.has_updates == 'true'
        id: existing-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          EXISTING=$(gh pr list \
            --label "style-guide-sync" \
            --state open \
            --json number \
            --jq '.[0].number' || echo '')
          if [ -n "$EXISTING" ]; then
            echo "Open PR #${EXISTING} already exists — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.check.outputs.has_updates == 'true' && steps.existing-pr.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        if: steps.check.outputs.has_updates == 'true' && steps.existing-pr.outputs.skip == 'false'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        if: steps.check.outputs.has_updates == 'true' && steps.existing-pr.outputs.skip == 'false'
        run: |
          cd .github/ai-reviewer
          pnpm install

      - name: Update style guide reference via Claude
        if: steps.check.outputs.has_updates == 'true' && steps.existing-pr.outputs.skip == 'false'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          STYLE_GUIDE_PATH: ${{ env.STYLE_GUIDE_PATH }}
          CHANGED_FILES: ${{ steps.check.outputs.changed_files }}
          LATEST_SHA: ${{ steps.check.outputs.latest_sha }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          npx tsx .github/ai-reviewer/scripts/sync-style-guide.ts

      - name: Open PR
        if: steps.check.outputs.has_updates == 'true' && steps.existing-pr.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LATEST_SHA: ${{ steps.check.outputs.latest_sha }}
          LATEST_DATE: ${{ steps.check.outputs.latest_date }}
          LATEST_MESSAGE: ${{ steps.check.outputs.latest_message }}
          CHANGE_COUNT: ${{ steps.check.outputs.change_count }}
          CHANGED_FILES: ${{ steps.check.outputs.changed_files }}
        run: |
          set -euo pipefail

          BRANCH="sync-style-guide-${LATEST_SHA:0:8}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add .github/ai-reviewer/style-guide-reference.md .github/ai-reviewer/.style-guide-version

          if git diff --cached --quiet; then
            echo "No changes to commit — Claude returned identical content"
            exit 0
          fi

          git commit -m "chore: sync style-guide-reference.md to ${LATEST_SHA:0:8}"
          git push origin "$BRANCH"

          cat > /tmp/pr-body.md << PREOF_DELIM
          ## Style guide drift detected

          The style guide source at \`${STYLE_GUIDE_PATH}\` has changed since \`style-guide-reference.md\` was last synced.

          **Latest commit:** \`${LATEST_SHA}\`
          **Date:** ${LATEST_DATE}
          **Message:** ${LATEST_MESSAGE}
          **Files changed:** ${CHANGE_COUNT}

          \`\`\`
          ${CHANGED_FILES}
          \`\`\`

          ## What Claude did

          \`style-guide-reference.md\` has been automatically updated based on the changed files above. Please review the diff to make sure it accurately reflects the style guide changes before merging.

          ## Reviewer checklist

          - [ ] Review the \`style-guide-reference.md\` diff
          - [ ] Adjust if anything is missing or incorrect
          - [ ] Merge when satisfied

          ---
          *Opened automatically by the style guide sync workflow.*
          PREOF_DELIM

          gh pr create \
            --title "📚 Sync style-guide-reference.md to latest style guide" \
            --base main \
            --head "$BRANCH" \
            --reviewer "$PR_REVIEWER" \
            --assignee "$STYLE_GUIDE_REVIEWER" \
            --label "style-guide-sync" \
            --body-file /tmp/pr-body.md
