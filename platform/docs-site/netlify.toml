# For handling Kanopy routing distinction between mongodb.com and products/updates _next/static request we needed to use 
# assetPrefix to move products/updates _next/static under /docs allowing for request coming from Kanopy to be handled by B2k and NextJs
# This redirect handles NextJs assuming _next/static to be under docs but when deployed in to our CDN the static folder sits at the root
# See EPIC below for more context
# https://jira.mongodb.org/browse/DOP-6064

[build.environment]
SECRETS_SCAN_ENABLED = "false"
NEXTJS_EXTENSION_ENABLED = "false"
NEXTJS_EXTENSION_ENABLED_STAGING = "false"
NEXTJS_EXTENSION_ENABLED_STAGING_2 = "false"
NEXTJS_SSG_EXTENSION_ENABLED = "true"
POPULATE_METADATA_ENABLED = "false"

[context.production.environment]
ENV = "dotcomprd"

[context.preprd.environment]
ENV = "dotcomstg"

[context.deploy-preview.environment]
ENV = "prd"

[context.branch-deploy.environment]
ENV = "prd"

[context.preview-server.environment]
ENV = "prd"

[context.dev.environment]
ENV = "stg"

# Standalone zone builds set assetPrefix to their own docset prefix (see
# next.config.mjs getZoneAssetPrefix), so their HTML requests _next assets
# under that prefix (e.g. /docs/languages/python/django-mongodb/_next/*). Like
# the docs_static_nextjs rule above, map any such prefixed request back to the
# real root /_next/* so the deploy serves the asset — directly and through b2k.
#
# Netlify has no multi-segment wildcard (only one trailing splat per rule), so
# we enumerate prefix depths with single-segment placeholders; the trailing
# splat carries the asset path. Docset prefixes are 1–3 segments today; depth 4
# is a harmless pad for future zones. This covers every zone generically — no
# per-zone rule needed.
[[redirects]]
from = "/docs/docs_static_nextjs/_next/*"
to = "/_next/:splat"
status = 200

[[redirects]]
from = "/docs/:p1/docs_static_nextjs/_next/*"
to = "/_next/:splat"
status = 200

[[redirects]]
from = "/docs/:p1/:p2/docs_static_nextjs/_next/*"
to = "/_next/:splat"
status = 200

[[redirects]]
from = "/docs/:p1/:p2/:p3/docs_static_nextjs/_next/*"
to = "/_next/:splat"
status = 200

[[redirects]]
from = "/docs/:p1/:p2/:p3/:p4/docs_static_nextjs/_next/*"
to = "/_next/:splat"
status = 200

# Per-docset sitemaps and intersphinx inventories are staged into
# .next/static/docs-metadata/<url-prefix>/ by scripts/build-content-metadata.ts
# (postbuild), the same way content images land in .next/static/images. They can't
# ride the _next asset URL directly like images do, because these files must resolve
# at fixed canonical URLs — intersphinx hardcodes <base-url>/objects.inv and the
# sitemaps are consumed at their /docs/<prefix>/ URLs. So we rewrite (status 200,
# URL preserved) the canonical path onto the real static file under /_next/static/.
#
# As with the _next rules above, Netlify has no multi-segment wildcard, so we
# enumerate prefix depths with single-segment placeholders. The canonical prefix
# is the docset prefix (1–3 segments) plus a version segment for versioned docsets
# (e.g. languages/python/django-mongodb/current), so it's up to 4 segments today;
# depths 0 and 5 are harmless pads for the root docset and future nesting. The
# filename is fixed, so it can't be carried by a trailing splat.
[[redirects]]
from = "/docs/objects.inv"
to = "/_next/static/docs-metadata/objects.inv"
status = 200

[[redirects]]
from = "/docs/:p1/objects.inv"
to = "/_next/static/docs-metadata/:p1/objects.inv"
status = 200

[[redirects]]
from = "/docs/:p1/:p2/objects.inv"
to = "/_next/static/docs-metadata/:p1/:p2/objects.inv"
status = 200

[[redirects]]
from = "/docs/:p1/:p2/:p3/objects.inv"
to = "/_next/static/docs-metadata/:p1/:p2/:p3/objects.inv"
status = 200

[[redirects]]
from = "/docs/:p1/:p2/:p3/:p4/objects.inv"
to = "/_next/static/docs-metadata/:p1/:p2/:p3/:p4/objects.inv"
status = 200

[[redirects]]
from = "/docs/:p1/:p2/:p3/:p4/:p5/objects.inv"
to = "/_next/static/docs-metadata/:p1/:p2/:p3/:p4/:p5/objects.inv"
status = 200

[[redirects]]
from = "/docs/sitemap-0.xml"
to = "/_next/static/docs-metadata/sitemap-0.xml"
status = 200

[[redirects]]
from = "/docs/:p1/sitemap-0.xml"
to = "/_next/static/docs-metadata/:p1/sitemap-0.xml"
status = 200

[[redirects]]
from = "/docs/:p1/:p2/sitemap-0.xml"
to = "/_next/static/docs-metadata/:p1/:p2/sitemap-0.xml"
status = 200

[[redirects]]
from = "/docs/:p1/:p2/:p3/sitemap-0.xml"
to = "/_next/static/docs-metadata/:p1/:p2/:p3/sitemap-0.xml"
status = 200

[[redirects]]
from = "/docs/:p1/:p2/:p3/:p4/sitemap-0.xml"
to = "/_next/static/docs-metadata/:p1/:p2/:p3/:p4/sitemap-0.xml"
status = 200

[[redirects]]
from = "/docs/:p1/:p2/:p3/:p4/:p5/sitemap-0.xml"
to = "/_next/static/docs-metadata/:p1/:p2/:p3/:p4/:p5/sitemap-0.xml"
status = 200

[[redirects]]
from = "/docs/sitemap-index.xml"
to = "/_next/static/docs-metadata/sitemap-index.xml"
status = 200

[[redirects]]
from = "/docs/:p1/sitemap-index.xml"
to = "/_next/static/docs-metadata/:p1/sitemap-index.xml"
status = 200

[[redirects]]
from = "/docs/:p1/:p2/sitemap-index.xml"
to = "/_next/static/docs-metadata/:p1/:p2/sitemap-index.xml"
status = 200

[[redirects]]
from = "/docs/:p1/:p2/:p3/sitemap-index.xml"
to = "/_next/static/docs-metadata/:p1/:p2/:p3/sitemap-index.xml"
status = 200

[[redirects]]
from = "/docs/:p1/:p2/:p3/:p4/sitemap-index.xml"
to = "/_next/static/docs-metadata/:p1/:p2/:p3/:p4/sitemap-index.xml"
status = 200

[[redirects]]
from = "/docs/:p1/:p2/:p3/:p4/:p5/sitemap-index.xml"
to = "/_next/static/docs-metadata/:p1/:p2/:p3/:p4/:p5/sitemap-index.xml"
status = 200

# Applies soft redirects on 404s (static build has no server). See src/redirects/README.md.
[[edge_functions]]
path = "/docs/*"
function = "soft-redirects"

[dev]
framework = "next"
command = "next dev"
publish = ".next"
