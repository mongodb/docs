name: C#/.NET Driver Code Examples - Test Against Local/Docker

on:
  schedule:
    # Run monthly on the 1st at 9am UTC
    - cron: '0 9 1 * *'
  pull_request:
    paths:
      - code-example-tests/csharp/driver/**

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changed tests
        id: detect
        run: bash .github/scripts/detect-changed-tests.sh csharp
      - name: Verify comparison-kernel binaries are up to date
        if: steps.detect.outputs.run_all == 'true' || steps.detect.outputs.test_filter != ''
        uses: ./.github/actions/verify-comparison-kernel
      - name: Install Atlas CLI
        if: steps.detect.outputs.run_all == 'true' || steps.detect.outputs.test_filter != ''
        run: |
          curl https://fastdl.mongodb.org/mongocli/mongodb-atlas-cli_1.50.0_linux_x86_64.deb --output atlas-cli.deb
          sudo apt install ./atlas-cli.deb
      - name: Set up a local deployment using Atlas CLI
        if: steps.detect.outputs.run_all == 'true' || steps.detect.outputs.test_filter != ''
        run: |
          atlas deployments setup myLocalRs1 --type local --port 27017 --force
      - name: Install MongoDB Database Tools to load sample data
        if: steps.detect.outputs.run_all == 'true' || steps.detect.outputs.test_filter != ''
        run: |
          curl https://fastdl.mongodb.org/tools/db/mongodb-database-tools-ubuntu2204-x86_64-100.13.0.deb --output mdb-db-tools.deb
          sudo apt install ./mdb-db-tools.deb
      - name: Download sample data
        if: steps.detect.outputs.run_all == 'true' || steps.detect.outputs.test_filter != ''
        run: curl  https://atlas-education.s3.amazonaws.com/sampledata.archive -o sampledata.archive
      - name: Add sample data to database
        if: steps.detect.outputs.run_all == 'true' || steps.detect.outputs.test_filter != ''
        run: mongorestore --archive=sampledata.archive --port=27017
      - name: Setup .NET
        if: steps.detect.outputs.run_all == 'true' || steps.detect.outputs.test_filter != ''
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0'
      - name: Restore dependencies
        if: steps.detect.outputs.run_all == 'true' || steps.detect.outputs.test_filter != ''
        run: |
          cd code-example-tests/csharp/driver/
          dotnet restore
      - name: Create environment file
        if: steps.detect.outputs.run_all == 'true' || steps.detect.outputs.test_filter != ''
        run: |
          cd code-example-tests/csharp/driver/
          touch .env
          echo "CONNECTION_STRING=\"mongodb://localhost:27017/?directConnection=true\"" >> .env
          echo "SOLUTION_ROOT=$(pwd)" >> .env
      - name: Download Automatic Encryption Shared Library
        run: |
          wget https://downloads.mongodb.com/linux/mongo_crypt_shared_v1-linux-x86_64-enterprise-ubuntu2204-8.3.2.tgz
          tar -xvzf mongo_crypt_shared_v1-linux-x86_64-enterprise-ubuntu2204-8.3.2.tgz lib/mongo_crypt_v1.so
          echo "CRYPT_SHARED_LIB_PATH=$(pwd)/lib/mongo_crypt_v1.so" >> code-example-tests/csharp/driver/.env
      - name: Run tests
        if: steps.detect.outputs.run_all == 'true' || steps.detect.outputs.test_filter != ''
        run: |
          cd code-example-tests/csharp/driver/
          dotnet build --no-incremental
          if [[ "${{ steps.detect.outputs.run_all }}" != "false" ]] || [[ -z "${{ steps.detect.outputs.test_filter }}" ]]; then
            dotnet test Tests/Tests.csproj --no-build
          else
            dotnet test Tests/Tests.csproj --no-build --filter '${{ steps.detect.outputs.test_filter }}'
          fi

      - name: Notify Slack on scheduled run failure
        if: failure() && github.event_name == 'schedule'
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{
              "channel": "#docs-devdocs-notifications",
              "username": "Code Examples Bot",
              "icon_emoji": ":warning:",
              "text": "⚠️ *C#/.NET Driver* monthly code examples test failed!\n*Workflow:* ${{ github.workflow }}\n*Run:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }' \
            "$SLACK_WEBHOOK"
