---
title: "Install Homebrew."
ref: install-homebrew
level: 4
content: |

   Refer to the `Homebrew <https://brew.sh/>`__ website
   for the steps to install Homebrew on macOS.
---
title: "Install the mongosh package."
ref: install-mongosh-package
level: 4
content: |

   Issue the following command from the terminal to install the
   ``mongosh`` package:

   .. code-block:: sh

      brew install mongosh
---
title: "Confirm that mongosh installed successfully."
ref: confirm-install-macos-homebrew
level: 4
content: |

   To confirm that ``mongosh`` installed successfully, run the
   following command:

   .. code-block:: sh

      mongosh --version

   The command returns the version of ``mongosh`` you installed.
