name: Notify Slack on docs-maverick PR ready for review

on:
  pull_request:
    # ready_for_review = draft -> ready transition.
    # opened/reopened    = PR created/reopened directly as non-draft.
    # review_requested   = a reviewer added after the PR is already open.
    types: [ready_for_review, opened, reopened, review_requested]

# Serialize runs for the same PR so the "already notified" check can't be
# raced by two events firing at once. Do NOT cancel in-progress runs, or a
# run that has already sent Slack could be killed before it sets the marker.
concurrency:
  group: maverick-notify-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  notify-maverick:
    runs-on: ubuntu-latest
    # Skip drafts; only notify when the PR is actually ready for review.
    if: github.event.pull_request.draft == false
    steps:
      - name: Check docs-maverick author and reviewers
        id: check
        uses: actions/github-script@v7
        with:
          # PAT (or fine-grained token) with read:org / "Members: Read" to read
          # team membership, and repo write to add the dedup label below.
          # The default GITHUB_TOKEN cannot read org team membership.
          github-token: ${{ secrets.DEPENDABOT_PAT }}
          script: |
            const ORG = '10gen';
            const TEAM_SLUG = 'docs-maverick';
            const NOTIFIED_LABEL = 'maverick-review-notified';

            const pr = context.payload.pull_request;

            // Idempotency guard: if we've already notified for this PR, stop.
            // Fetch labels live (the event payload may be stale relative to a
            // run that just finished for an earlier event on the same PR).
            const currentLabels = await github.paginate(
              github.rest.issues.listLabelsOnIssue,
              { owner: context.repo.owner, repo: context.repo.repo, issue_number: pr.number, per_page: 100 }
            );
            if (currentLabels.some(l => l.name === NOTIFIED_LABEL)) {
              core.info('PR already notified (label present); skipping.');
              core.setOutput('notify', 'false');
              return;
            }

            // Fetch all docs-maverick members once into a Set.
            const members = await github.paginate(
              github.rest.teams.listMembersInOrg,
              { org: ORG, team_slug: TEAM_SLUG, per_page: 100 }
            );
            const team = new Set(members.map(m => m.login.toLowerCase()));

            // Condition 1: PR author is on the team.
            const author = pr.user.login;
            const authorOnTeam = team.has(author.toLowerCase());

            // Condition 2: at least one requested reviewer is on the team.
            const reviewers = (pr.requested_reviewers || []).map(r => r.login);
            const reviewerOnTeam = reviewers.some(r => team.has(r.toLowerCase()));

            core.info(`Author: ${author} (on team: ${authorOnTeam})`);
            core.info(`Requested reviewers: ${reviewers.join(', ') || '(none)'}`);
            core.info(`A reviewer is on the team: ${reviewerOnTeam}`);

            const shouldNotify = authorOnTeam && reviewerOnTeam;
            core.setOutput('notify', String(shouldNotify));

            // Prefer the author's display name, fall back to their login.
            let authorName = author;
            try {
              const { data: user } = await github.rest.users.getByUsername({ username: author });
              if (user.name) authorName = user.name;
            } catch (e) {
              core.warning(`Could not fetch display name for ${author}: ${e.message}`);
            }
            core.setOutput('author_name', authorName);

      - name: Send Slack notification
        if: steps.check.outputs.notify == 'true'
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_MAVERICK_WEBHOOK }}
          webhook-type: incoming-webhook
          # Workflow Builder webhooks treat "text" as plain text and do NOT
          # parse Slack's <url|label> link syntax. Send a bare URL instead:
          # Slack auto-links it and unfurls a GitHub preview card.
          payload: |
            {
              "text": "New PR for the team to review, opened by ${{ steps.check.outputs.author_name }}: ${{ github.event.pull_request.title }}\n${{ github.event.pull_request.html_url }}"
            }

      - name: Mark PR as notified
        # Runs only after Slack succeeds, so a failed send leaves no marker
        # and the next event can retry. Uses the default GITHUB_TOKEN (not
        # DEPENDABOT_PAT) since writing labels only needs repo write access.
        if: steps.check.outputs.notify == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: ['maverick-review-notified'],
            });
